<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mandala Cymatic Vibrations</title>
  <meta name="theme-color" content="#120e1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mandala" />
  <link rel="apple-touch-icon" href="/pwa/apple-touch-icon-180.png?v=8ebc9360" />
  <link rel="stylesheet" href="/styles.css?v=8ebc9360" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="cb" content="8ebc9360">
  <link rel="icon" type="image/svg+xml" href="/cb-shapes/14.svg?v=8ebc9360">
  <script src="/cb-badge.js?v=8ebc9360" defer></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 class="title">Mandala Cymatic Vibrations</h1>
    </header>

    <div class="stage">
      <canvas id="canvas" width="400" height="400" aria-label="Mandala" hidden></canvas>
      <canvas id="glcanvas" width="512" height="512" aria-label="Cymatic vibrations"></canvas>
      <!-- Read-only live readings, floating over the top of the mandala. -->
      <div class="readout" id="readout" hidden aria-hidden="true">
        <div class="sparks">
          <div class="sig"><span class="sl">Amp</span><span class="sv" id="cy-amp">0.00</span><canvas class="spk" id="spk-amp"></canvas></div>
          <div class="sig"><span class="sl">dB</span><span class="sv" id="sig-db">—</span><canvas class="spk" id="spk-db"></canvas></div>
          <div class="sig"><span class="sl">Bass</span><span class="sv" id="sig-bass">0.00</span><canvas class="spk" id="spk-bass"></canvas></div>
          <div class="sig"><span class="sl">Mid</span><span class="sv" id="sig-mid">0.00</span><canvas class="spk" id="spk-mid"></canvas></div>
          <div class="sig"><span class="sl">Treb</span><span class="sv" id="sig-treble">0.00</span><canvas class="spk" id="spk-treble"></canvas></div>
          <div class="sig"><span class="sl">React</span><span class="sv" id="sig-react">0.00</span><canvas class="spk" id="spk-react"></canvas></div>
          <div class="sig"><span class="sl">Cntr</span><span class="sv" id="sig-centroid">0.00</span><canvas class="spk" id="spk-centroid"></canvas></div>
          <div class="sig"><span class="sl">Flat</span><span class="sv" id="sig-flatness">0.00</span><canvas class="spk" id="spk-flatness"></canvas></div>
        </div>
        <div class="readfoot">
          <div class="progress"><div class="bar" id="cy-bar" style="width:0%"></div></div>
          <span class="rstat"><b id="cy-phase">At rest</b> · <span id="cy-mode">—</span> · <span id="cy-count">—</span></span>
        </div>
      </div>
    </div>

    <div class="transport" id="transport">
      <button id="autoplay" class="tbtn tbtn-toggle" data-state="off" title="Autoplay" aria-label="Autoplay" aria-pressed="false"></button>
      <button id="mic" class="tbtn tbtn-toggle" data-state="off" title="Listen — react to ambient sound / music" aria-label="Microphone" aria-pressed="false"></button>
      <div class="ctl-group">
        <button id="strike" class="tbtn tbtn-manual tbtn-strike" title="Strike gong (hit further from center = harder)" aria-label="Strike gong"><span class="strike-ring" aria-hidden="true"></span></button>
        <button id="reform" class="tbtn tbtn-manual" title="Reform mandala" aria-label="Reform mandala"></button>
        <button id="random-mandala" class="tbtn tbtn-manual" title="Random Tibetan mandala" aria-label="Random Tibetan mandala"></button>
        <button id="random-creative" class="tbtn tbtn-manual" title="Random creative pattern" aria-label="Random creative pattern"></button>
      </div>
      <button id="panel-toggle" class="tbtn plus" title="Show dashboard" aria-expanded="false" aria-label="Toggle dashboard"></button>
    </div>

    <div class="modes" id="modes" role="tablist" aria-label="Reactivity mode">
      <button id="tab-ohm" class="tbtn tab" data-state="on" role="tab" aria-selected="true" title="ohm — tuned for hums / sustained tones" aria-label="ohm reactivity"></button>
      <button id="tab-allmusic" class="tbtn tab" data-state="off" role="tab" aria-selected="false" title="all-music — broad reactivity (in tuning)" aria-label="all-music reactivity"></button>
      <button id="tab-techno" class="tbtn tab" data-state="off" role="tab" aria-selected="false" title="techno — kick + hats, punchy (in tuning)" aria-label="techno reactivity"></button>
    </div>

    <section class="panel" id="panel" hidden>
      <h2 class="panel-h">Cymatics</h2>
      <div class="sliders">
        <div class="ctrl"><label for="c-jolt">Jolt</label>
          <div class="ctrl-row"><input type="range" id="c-jolt" min="0" max="100" step="1" value="41" /><span class="val" id="c-jolt-v">0.55</span></div></div>
        <div class="ctrl"><label for="c-settle">Settle</label>
          <div class="ctrl-row"><input type="range" id="c-settle" min="0" max="100" step="1" value="60" /><span class="val" id="c-settle-v">0.86</span></div></div>
        <div class="ctrl"><label for="c-decay">Decay</label>
          <div class="ctrl-row"><input type="range" id="c-decay" min="0" max="100" step="1" value="25" /><span class="val" id="c-decay-v">0.85s</span></div></div>
        <div class="ctrl"><label for="c-jitter">Jitter</label>
          <div class="ctrl-row"><input type="range" id="c-jitter" min="0" max="100" step="1" value="30" /><span class="val" id="c-jitter-v">0.30</span></div></div>
      </div>
      <h2 class="panel-h">Mic reactivity (bar = live music level)</h2>
      <div class="sliders">
        <div class="ctrl"><label for="c-floor">Floor</label>
          <div class="ctrl-row"><input type="range" id="c-floor" min="0" max="100" step="1" value="50" title="Noise floor. LEFT = ignore a quiet room (calmer); RIGHT = react to quieter sound. If it moves in silence, go left." /><span class="val" id="c-floor-v">-80dB</span></div></div>
        <div class="ctrl"><label for="c-low">Bass</label>
          <div class="ctrl-row"><input type="range" id="c-low" min="0" max="100" step="1" value="67" title="How much low frequencies (40–250 Hz: kick, bass) drive the vibration." /><span class="val" id="c-low-v">1.00</span></div></div>
        <div class="ctrl"><label for="c-mid">Mid</label>
          <div class="ctrl-row"><input type="range" id="c-mid" min="0" max="100" step="1" value="47" title="How much mid frequencies (250–2000 Hz: body, vocals, melody) drive the vibration." /><span class="val" id="c-mid-v">0.70</span></div></div>
        <div class="ctrl"><label for="c-high">Treble</label>
          <div class="ctrl-row"><input type="range" id="c-high" min="0" max="100" step="1" value="33" title="How much high frequencies (2–8 kHz: hats, air, violin presence) drive the vibration." /><span class="val" id="c-high-v">0.50</span></div></div>
        <div class="ctrl"><label for="c-react">React</label>
          <div class="ctrl-row"><input type="range" id="c-react" min="0" max="100" step="1" value="35" title="Overall strength of the reaction." /><span class="val" id="c-react-v">1.5×</span></div></div>
        <div class="ctrl"><label for="c-punch">Scatter</label>
          <div class="ctrl-row"><input type="range" id="c-punch" min="0" max="100" step="1" value="40" title="Steady diffusion: how much the sand jumps around the nodal lines between hits. Lower = settles tight on the lines; higher = livelier." /><span class="val" id="c-punch-v">0.40</span></div></div>
        <div class="ctrl"><label for="c-fling">Fling</label>
          <div class="ctrl-row"><input type="range" id="c-fling" min="0" max="100" step="1" value="20" title="Transient dispersal: how hard each onset (drum/bass/treble hit) throws the grains off the lines before they re-organize. Higher = more flung, a stronger succession of patterns." /><span class="val" id="c-fling-v">1.2</span></div></div>
        <div class="ctrl"><label for="c-flow">Flow</label>
          <div class="ctrl-row"><input type="range" id="c-flow" min="0" max="100" step="1" value="25" title="Continuous agitation — keeps the grains perpetually moving so the figure never freezes into one static pattern. Higher = more alive/wandering; lower = settles tight onto the lines." /><span class="val" id="c-flow-v">0.12</span></div></div>
      </div>
      <h2 class="panel-h">Pattern</h2>
      <div class="sliders">
        <div class="ctrl"><label for="p-order">Symmetry order</label>
          <div class="ctrl-row"><input type="range" id="p-order" min="3" max="24" step="1" value="16" /><span class="val" id="p-order-v">16</span></div></div>
        <div class="ctrl"><label for="p-depth">Layering depth</label>
          <div class="ctrl-row"><input type="range" id="p-depth" min="1" max="10" step="1" value="6" /><span class="val" id="p-depth-v">6</span></div></div>
        <div class="ctrl"><label for="p-hue">Hue rotation</label>
          <div class="ctrl-row"><input type="range" id="p-hue" min="0" max="360" step="5" value="0" /><span class="val" id="p-hue-v">0°</span></div></div>
        <div class="ctrl"><label for="p-cplx">Complexity</label>
          <div class="ctrl-row"><input type="range" id="p-cplx" min="1" max="6" step="1" value="3" /><span class="val" id="p-cplx-v">3</span></div></div>
        <div class="ctrl ctrl-check"><label for="p-lock-detail">Lock detail</label>
          <div class="ctrl-row"><input type="checkbox" id="p-lock-detail" title="Keep the current Layering depth + Complexity when you randomize a mandala (so randoms stay detailed instead of rolling low values)." /></div></div>
        <div class="ctrl"><label for="p-jitter">Perturbation</label>
          <div class="ctrl-row"><input type="range" id="p-jitter" min="0" max="100" step="5" value="0" /><span class="val" id="p-jitter-v">0.00</span></div></div>
        <div class="ctrl"><label for="p-pal">Palette</label>
          <div class="ctrl-row"><select id="p-pal">
            <option value="buddhas">Five Buddhas</option>
            <option value="sunrise">Sunrise</option>
            <option value="ember">Ember</option>
            <option value="lagoon">Lagoon</option>
            <option value="twilight">Twilight</option>
            <option value="saffron">Saffron</option>
            <option value="meadow">Meadow</option>
            <option value="blossom">Blossom</option>
          </select></div></div>
        <div class="ctrl"><label for="cy-particles">Particle count</label>
          <div class="ctrl-row"><select id="cy-particles">
            <option value="50000">50k</option>
            <option value="100000">100k</option>
            <option value="150000">150k</option>
            <option value="200000" selected>200k</option>
            <option value="350000">350k</option>
            <option value="500000">500k</option>
            <option value="750000">750k</option>
            <option value="1000000">1M</option>
          </select></div></div>
      </div>
    </section>
  </div>

  <script type="module" src="/src/main.ts?v=8ebc9360"></script>
</body>
</html>
